<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Your Email - FarmaSense</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- FontAwesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        :root {
            --primary-green: #2d6a4f;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: #f0f2f5;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .verify-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .verify-card {
            width: 450px;
            background: white;
            border-radius: 30px;
            padding: 40px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        .otp-input-group {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin: 30px 0;
        }

        .otp-input-group input {
            width: 50px;
            height: 60px;
            text-align: center;
            font-size: 1.5rem;
            font-weight: 700;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            color: var(--primary-green);
        }

        .otp-input-group input:focus {
            border-color: var(--primary-green);
            outline: none;
            box-shadow: 0 0 0 3px rgba(45, 106, 79, 0.1);
        }

        .btn-verify {
            background-color: var(--primary-green);
            color: white;
            border: none;
            padding: 15px;
            width: 100%;
            border-radius: 15px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s;
        }

        .btn-verify:hover {
            background-color: #1b4332;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(45, 106, 79, 0.2);
        }
    </style>
</head>

<body>
    <div th:replace="fragments/header :: header"></div>

    <main class="verify-container">
        <div class="verify-card">
            <div class="mb-4">
                <div class="bg-success bg-opacity-10 text-success rounded-circle d-inline-flex align-items-center justify-content-center mb-3" style="width: 80px; height: 80px;">
                    <i class="fas fa-envelope-open-text fa-2x"></i>
                </div>
                <h2 class="fw-bold text-dark">Verify Your Email</h2>
                <p class="text-secondary">Please enter the 6-digit verification code sent to:</p>
                <div class="badge bg-success bg-opacity-10 text-success px-3 py-2 rounded-pill mb-3">
                    <i class="fas fa-envelope me-2"></i> <span th:text="${email != null ? email : 'your email'}">user@example.com</span>
                </div>
            </div>

            <div th:if="${error}" class="alert alert-danger border-0 rounded-3 small py-2 mb-4">
                <i class="fas fa-exclamation-circle me-2"></i> <span th:text="${error}">Error message</span>
            </div>

            <form th:action="@{/verify-otp}" method="post">
                <input type="hidden" name="username" th:value="${username}">
                
                <div class="mb-4">
                    <input type="text" name="code" class="form-control text-center py-3 fs-4 fw-bold letter-spacing-5" 
                           placeholder="000000" maxlength="6" required pattern="\d{6}">
                </div>

                <button type="submit" class="btn btn-verify shadow-sm">
                    Verify Account <i class="fas fa-shield-alt ms-2"></i>
                </button>
            </form>

            <div class="mt-4">
                <p class="small text-secondary">
                    Didn't receive the code? <a href="#" class="text-success fw-bold text-decoration-none">Resend Code</a>
                </p>
                <a th:href="@{/login}" class="small text-muted text-decoration-none">
                    <i class="fas fa-arrow-left me-1"></i> Back to Login
                </a>
            </div>
        </div>
    </main>

    <div th:replace="fragments/footer :: footer"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
