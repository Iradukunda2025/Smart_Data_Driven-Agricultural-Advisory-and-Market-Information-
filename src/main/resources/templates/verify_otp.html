<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Your Email - FarmaSense</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- FontAwesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .verify-card {
            max-width: 500px;
            width: 100%;
            background: white;
            border-radius: 35px;
            padding: 50px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.05);
            text-align: center;
        }

        .icon-circle {
            width: 80px;
            height: 80px;
            background-color: #d1fae5;
            color: #065f46;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 25px;
        }

        .email-badge {
            background-color: #d1fae5;
            color: #065f46;
            padding: 8px 20px;
            border-radius: 50px;
            font-size: 0.85rem;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 30px;
        }

        .code-input {
            width: 100%;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            padding: 15px;
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: 8px;
            text-align: center;
            margin-bottom: 25px;
            background: #f8fafc;
        }

        .btn-verify {
            background-color: #2d6a4f;
            color: white;
            border: none;
            width: 100%;
            padding: 15px;
            border-radius: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 20px;
            transition: 0.3s;
        }

        .btn-verify:hover {
            background-color: #1b4332;
            color: white;
            transform: translateY(-2px);
        }

        .resend-link {
            color: #2d6a4f;
            text-decoration: none;
            font-weight: 700;
        }
    </style>
</head>

<body class="bg-light d-flex flex-column min-vh-100">
    <div th:replace="fragments/header :: header"></div>
    <main class="flex-grow-1 d-flex align-items-center justify-content-center py-5">
        <div class="verify-card">
            <div class="icon-circle">
                <i class="fas fa-envelope-open-text fa-2x"></i>
            </div>
            
            <h2 class="fw-bold text-dark mb-2">Verify Your Email</h2>
            <p class="text-muted small mb-4">Please enter the 6-digit verification code sent to:</p>
            
            <div class="email-badge">
                <i class="fas fa-envelope small"></i>
                <span th:text="${email != null ? email : 'your email'}">user@example.com</span>
            </div>

            <div th:if="${error}" class="alert alert-danger border-0 rounded-4 py-2 mb-4">
                <span th:text="${error}">Error message</span>
            </div>

            <form th:action="@{/verify-otp}" method="post">
                <input type="hidden" name="username" th:value="${username}">

                <input type="text" name="code" class="code-input" maxlength="6" placeholder="000000" required>

                <button type="submit" class="btn-verify">
                    VERIFY ACCOUNT <i class="fas fa-shield-alt ms-1"></i>
                </button>
            </form>

            <div class="mt-4 pt-3 border-top border-light">
                <p class="small text-muted mb-3">
                    Didn't receive the code? <a href="#" class="resend-link">Resend Code</a>
                </p>
                <a th:href="@{/login}" class="small text-muted text-decoration-none">
                    <i class="fas fa-arrow-left me-1"></i> Back to Login
                </a>
            </div>
        </div>
    </main>


    <div th:replace="fragments/footer :: footer"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const inputs = document.querySelectorAll('.otp-box');
        const finalInput = document.getElementById('finalCode');

        inputs.forEach((input, index) => {
            input.addEventListener('input', (e) => {
                if (e.target.value.length > 1) {
                    e.target.value = e.target.value.slice(0, 1);
                }
                if (e.target.value !== "" && index < inputs.length - 1) {
                    inputs[index + 1].focus();
                }
                combineCode();
            });

            input.addEventListener('keydown', (e) => {
                if (e.key === "Backspace" && e.target.value === "" && index > 0) {
                    inputs[index - 1].focus();
                }
            });
        });

        function combineCode() {
            let code = "";
            inputs.forEach(input => code += input.value);
            finalInput.value = code;
        }
    </script>
</body>

</html>
