<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Your Email - FarmaSense</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- FontAwesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body class="bg-light d-flex flex-column min-vh-100">
    <div th:replace="fragments/header :: header"></div>
    <main class="verify-container flex-grow-1 d-flex align-items-center justify-content-center py-5">
        <div class="card border-0 shadow-xl rounded-5 p-5 bg-white text-center" style="max-width: 500px; width: 100%;">
            <div class="mb-4">
                <div class="avatar-lg sky-bg text-primary rounded-circle d-inline-flex align-items-center justify-content-center mb-3"
                    style="width: 90px; height: 90px;">
                    <i class="fas fa-shield-keyhole fa-3x"></i>
                </div>
                <h2 class="fw-bold text-dark text-gradient-sky">Node Verification</h2>
                <p class="text-gray small text-uppercase ls-1 fw-bold">Identity Authentication Protocol</p>
                <div class="badge bg-primary bg-opacity-10 text-primary-sky px-4 py-2 rounded-pill mt-2">
                    <i class="fas fa-satellite-dish me-2 x-small"></i> <span
                        th:text="${email != null ? email : 'your email'}">user@example.com</span>
                </div>
            </div>

            <div th:if="${error}" class="alert alert-danger border-0 rounded-4 x-small py-3 mb-4 shadow-sm">
                <i class="fas fa-triangle-exclamation me-2"></i> <span th:text="${error}">Error message</span>
            </div>

            <form th:action="@{/verify-otp}" method="post">
                <input type="hidden" name="username" th:value="${username}">

                <div class="mb-4 text-start">
                    <label class="form-label x-small fw-bold text-gray ls-1">ACCESS CODE (6 DIGITS)</label>
                    <input type="text" name="code"
                        class="form-control text-center py-3 fs-3 fw-bold ls-5 bg-light border-0 rounded-4"
                        placeholder="000000" maxlength="6" required pattern="\d{6}">
                </div>

                <button type="submit" class="btn btn-primary-sky w-100 py-3 rounded-4 fw-bold shadow-lg">
                    Finalize Authentication <i class="fas fa-microchip ms-2"></i>
                </button>
            </form>

            <div class="mt-5 border-top border-primary border-opacity-10 pt-4">
                <p class="small text-gray">
                    Ingestion delay? <a href="#" class="text-primary-sky fw-bold text-decoration-none">Trigger
                        Resend</a>
                </p>
                <a th:href="@{/login}" class="x-small text-gray text-decoration-none hover-primary">
                    <i class="fas fa-house-lock me-1"></i> Return to Nexus Login
                </a>
            </div>
        </div>
    </main>


    <div th:replace="fragments/footer :: footer"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
