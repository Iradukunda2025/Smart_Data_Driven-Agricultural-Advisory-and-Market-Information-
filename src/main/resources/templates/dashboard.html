<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - FarmaSense</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="bg-light d-flex flex-column min-vh-100">

    <!-- Header Fragment -->
    <div th:replace="fragments/header :: header"></div>

    <div class="container mt-5 flex-grow-1">
        <div class="row justify-content-center">
            <div class="col-md-8 text-center py-5">
                <div class="card border-0 shadow-sm p-5 rounded-4">
                    <div class="mb-4">
                        <i class="fas fa-user-shield fa-4x text-success"></i>
                    </div>
                    <h2 class="fw-bold text-dark">Welcome to FarmaSense</h2>
                    <p class="lead text-secondary mt-3">
                        Your account is currently being processed or does not have a specific dashboard assigned yet.
                    </p>
                    <hr class="my-4 mx-auto w-25">
                    <p class="text-muted">
                        Please contact the administrator if you believe this is an error, or use the menu above to explore the platform.
                    </p>
                    <div class="mt-4">
                        <a th:href="@{/}" class="btn btn-success px-4 py-2 rounded-pill fw-bold">Back to Home</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer Fragment -->
    <div th:replace="fragments/footer :: footer"></div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
