<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>User Governance - FarmaSense</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .user-card {
            border-radius: 20px;
            border: none;
            box-shadow: 0 10px 30px rgba(0,0,0,0.03);
            background: white;
            overflow: hidden;
        }
        .status-pill {
            padding: 4px 12px;
            border-radius: 50px;
            font-size: 0.75rem;
            font-weight: 700;
        }
        .status-active { background: #dcfce7; color: #166534; }
        .status-disabled { background: #fee2e2; color: #991b1b; }
        .btn-action {
            width: 35px;
            height: 35px;
            border-radius: 10px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }
    </style>
</head>
<body class="bg-light">
    <div th:replace="fragments/header :: header"></div>

    <div class="container mt-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h2 class="fw-bold mb-0 text-gradient-sky">User Governance</h2>
                <p class="text-muted small">Manage system accounts and access levels</p>
            </div>
            <a th:href="@{/admin/dashboard}" class="btn btn-outline-secondary rounded-pill px-4">
                <i class="fas fa-arrow-left me-2"></i>Dashboard
            </a>
        </div>

        <div th:if="${success}" class="alert alert-success border-0 rounded-4 shadow-sm mb-4">
            <i class="fas fa-check-circle me-2"></i> <span th:text="${success}">Success</span>
        </div>
        <div th:if="${error}" class="alert alert-danger border-0 rounded-4 shadow-sm mb-4">
            <i class="fas fa-exclamation-circle me-2"></i> <span th:text="${error}">Error</span>
        </div>

        <div class="user-card">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="bg-light">
                        <tr class="text-muted small fw-bold">
                            <th class="ps-4 py-3">Full Name</th>
                            <th>Username</th>
                            <th>Email</th>
                            <th>Phone</th>
                            <th>Status</th>
                            <th class="text-end pe-4">Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="u : ${users}">
                            <td class="ps-4">
                                <div class="d-flex align-items-center">
                                    <div class="bg-primary bg-opacity-10 text-primary rounded-circle p-2 me-3">
                                        <i class="fas fa-user small"></i>
                                    </div>
                                    <span class="fw-bold" th:text="${u.fullName}">User Name</span>
                                </div>
                            </td>
                            <td th:text="${u.username}">username</td>
                            <td th:text="${u.email}">email@example.com</td>
                            <td th:text="${u.phoneNumber}">0788000000</td>
                            <td>
                                <span th:if="${u.enabled}" class="status-pill status-active">Active</span>
                                <span th:if="${!u.enabled}" class="status-pill status-disabled">Disabled</span>
                            </td>
                            <td class="text-end pe-4">
                                <a th:href="@{/admin/users/edit/{id}(id=${u.id})}" class="btn-action bg-info bg-opacity-10 text-info me-2">
                                    <i class="fas fa-edit"></i>
                                </a>
                                <form th:action="@{/admin/users/delete/{id}(id=${u.id})}" method="post" class="d-inline" onsubmit="return confirm('Are you sure you want to delete this user?');">
                                    <button type="submit" class="btn btn-action bg-danger bg-opacity-10 text-danger border-0">
                                        <i class="fas fa-trash"></i>
                                    </button>
                                </form>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div th:replace="fragments/footer :: footer"></div>
</body>
</html>
