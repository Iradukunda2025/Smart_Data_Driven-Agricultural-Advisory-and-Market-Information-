<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <header th:fragment="header">
        <nav class="navbar navbar-expand-lg navbar-dark bg-success shadow-sm py-3">
            <div class="container">
                <a class="navbar-brand fw-bold d-flex align-items-center" th:href="@{/}">
                    <i class="fas fa-leaf me-2"></i>
                    <span>FarmaSense</span>
                </a>
                <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                        <li class="nav-item">
                            <a class="nav-link active" th:href="@{/dashboard}">
                                <i class="fas fa-home me-1"></i> Dashboard
                            </a>
                        </li>
                        
                        <!-- Role-based Menus -->
                        <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                            <a class="nav-link" th:href="@{/admin/users}">
                                <i class="fas fa-users me-1"></i> Users
                            </a>
                        </li>
                        <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                            <a class="nav-link" th:href="@{/admin/advisories}">
                                <i class="fas fa-graduation-cap me-1"></i> Advisories
                            </a>
                        </li>
                        <li class="nav-item" sec:authorize="hasAnyRole('ADMIN', 'FARMER')">
                            <a class="nav-link" th:href="@{/weather}">
                                <i class="fas fa-cloud-sun me-1"></i> Weather
                            </a>
                        </li>
                        <li class="nav-item" sec:authorize="hasAnyRole('ADMIN', 'VENDOR', 'FARMER')">
                            <a class="nav-link" th:href="@{/market}">
                                <i class="fas fa-chart-line me-1"></i> Market Prices
                            </a>
                        </li>
                        <li class="nav-item" sec:authorize="hasRole('VENDOR')">
                            <a class="nav-link" th:href="@{/vendor/my-prices}">
                                <i class="fas fa-store me-1"></i> My Store
                            </a>
                        </li>
                    </ul>
                    <div class="d-flex align-items-center">
                        <div class="dropdown me-3" sec:authorize="isAuthenticated()">
                            <button class="btn btn-link text-white text-decoration-none dropdown-toggle p-0" type="button" id="userMenu" data-bs-toggle="dropdown">
                                <i class="fas fa-user-circle fa-lg me-1"></i>
                                <span th:text="${#authentication.name}">User</span>
                            </button>
                            <ul class="dropdown-menu dropdown-menu-end shadow border-0 mt-3">
                                <li><a class="dropdown-item" href="#"><i class="fas fa-id-card me-2"></i> Profile</a></li>
                                <li><a class="dropdown-item" href="#"><i class="fas fa-cog me-2"></i> Settings</a></li>
                                <li><hr class="dropdown-divider"></li>
                                <li>
                                    <form th:action="@{/logout}" method="post" class="px-3">
                                        <button type="submit" class="btn btn-danger btn-sm w-100 mt-1">
                                            <i class="fas fa-sign-out-alt me-1"></i> Logout
                                        </button>
                                    </form>
                                </li>
                            </ul>
                        </div>
                        <div sec:authorize="!isAuthenticated()">
                            <a th:href="@{/login}" class="btn btn-outline-light btn-sm px-4 rounded-pill me-2">Login</a>
                            <a th:href="@{/signup}" class="btn btn-light btn-sm px-4 rounded-pill text-success fw-bold">Sign Up</a>
                        </div>
                    </div>
                </div>
            </div>
        </nav>
    </header>
</body>
</html>
