<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Admin Dashboard - FarmaSense</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body class="bg-light d-flex flex-column min-vh-100">

    <!-- Header Fragment -->
    <div th:replace="fragments/header :: header"></div>

    <div class="container mt-4">
        <h2>Admin Dashboard</h2>
        <div class="row mt-4">
            <div class="col-12">
                <div class="card shadow-sm border-0 rounded-4 mb-4">
                    <div class="card-header bg-success text-white d-flex justify-content-between align-items-center py-3">
                        <h5 class="mb-0"><i class="fas fa-cloud-sun me-2"></i>Weather Data Management</h5>
                        <form th:action="@{/admin/weather/sync}" method="post">
                            <button type="submit" class="btn btn-light btn-sm fw-bold">
                                <i class="fas fa-sync-alt me-1"></i> Sync from Meteo Rwanda
                            </button>
                        </form>
                    </div>
                    <div class="card-body p-0">
                        <div class="table-responsive">
                            <table class="table table-hover mb-0">
                                <thead class="table-light">
                                    <tr>
                                        <th>Region</th>
                                        <th>Forecast</th>
                                        <th>Last Updated</th>
                                        <th>Actions</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr th:each="weather : ${weatherData}">
                                        <td th:text="${weather.region}" class="fw-bold">Kigali</td>
                                        <td>
                                            <span class="badge bg-info text-dark" th:text="${weather.forecast}">Sunny</span>
                                        </td>
                                        <td th:text="${#temporals.format(weather.date, 'dd-MM-yyyy')}">2026-03-13</td>
                                        <td>
                                            <button class="btn btn-sm btn-outline-primary"><i class="fas fa-edit"></i></button>
                                        </td>
                                    </tr>
                                    <tr th:if="${#lists.isEmpty(weatherData)}">
                                        <td colspan="4" class="text-center py-4 text-muted">No weather data available. Please sync with Meteo Rwanda.</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="row mt-2">
            <!-- Existing Management Cards -->
            <div class="col-md-6">
                <div class="card mb-4 shadow-sm border-0 rounded-4">
                    <div class="card-header bg-info text-white">User Management</div>
                    <div class="card-body">
                        <p>Total Users: 154</p>
                        <button class="btn btn-info btn-sm text-white">Manage Users</button>
                    </div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="card mb-4 shadow-sm border-0 rounded-4">
                    <div class="card-header bg-warning text-dark">Advisory Management</div>
                    <div class="card-body">
                        <p>Manage advisory content and market data.</p>
                        <button class="btn btn-warning btn-sm">Manage Advisories</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <!-- Footer Fragment -->
    <div th:replace="fragments/footer :: footer"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
