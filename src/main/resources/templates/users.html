<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Manage Users - FarmaSense</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex flex-column min-vh-100">
    <div th:replace="fragments/header :: header"></div>

    <div class="container mt-4 flex-grow-1">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="fw-bold text-success">User Management</h2>
            <button class="btn btn-success shadow-sm" data-bs-toggle="modal" data-bs-target="#addUserModal">
                <i class="fas fa-user-plus me-2"></i>Add System User
            </button>
        </div>

        <div class="card shadow-sm border-0 rounded-4 overflow-hidden">
            <div class="table-responsive">
                <table class="table table-hover mb-0">
                    <thead class="table-dark">
                        <tr>
                            <th>Username</th>
                            <th>Roles</th>
                            <th>Status</th>
                            <th class="text-end">Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="user : ${users}">
                            <td class="fw-bold">
                                <i class="fas fa-user-circle me-2 text-secondary"></i>
                                <span th:text="${user.username}">Username</span>
                            </td>
                            <td>
                                <span th:each="role : ${user.roles}" 
                                      class="badge bg-secondary me-1" 
                                      th:text="${role.name}">ROLE</span>
                            </td>
                            <td>
                                <span th:if="${user.enabled}" class="badge bg-success-subtle text-success">Active</span>
                                <span th:if="${!user.enabled}" class="badge bg-danger-subtle text-danger">Disabled</span>
                            </td>
                            <td class="text-end">
                                <div class="d-flex justify-content-end">
                                    <button class="btn btn-sm btn-outline-primary me-2"><i class="fas fa-user-edit"></i></button>
                                    <form th:action="@{/admin/users/delete}" method="post" onsubmit="return confirm('Delete this user account?')">
                                        <input type="hidden" name="id" th:value="${user.id}">
                                        <button type="submit" class="btn btn-sm btn-outline-danger"><i class="fas fa-user-slash"></i></button>
                                    </form>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Modal for adding user -->
    <div class="modal fade" id="addUserModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content border-0 rounded-4 shadow">
                <div class="modal-header bg-success text-white">
                    <h5 class="modal-title">Create New Account</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <form th:action="@{/signup}" method="post">
                    <div class="modal-body">
                        <div class="mb-3">
                            <label class="form-label">Username</label>
                            <input type="text" name="username" class="form-control" required placeholder="Pick a username">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Initial Password</label>
                            <input type="password" name="password" class="form-control" required placeholder="Choose a secure password">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Primary Role</label>
                            <select name="role" class="form-select" required>
                                <option value="ROLE_FARMER">Farmer</option>
                                <option value="ROLE_VENDOR">Vendor</option>
                                <option value="ROLE_ADMIN" sec:authorize="hasRole('ADMIN')">Administrator</option>
                            </select>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-light" data-bs-dismiss="modal">Cancel</button>
                        <button type="submit" class="btn btn-success">Create Account</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <div th:replace="fragments/footer :: footer"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
