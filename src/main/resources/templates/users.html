<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <title>Manage Users - FarmaSense</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>

<body class="bg-light d-flex flex-column min-vh-100">
    <div th:replace="fragments/header :: header"></div>

    <div class="container mt-5 flex-grow-1">
        <div class="d-flex justify-content-between align-items-center mb-5">
            <div>
                <h6 class="text-primary-sky fw-bold text-uppercase ls-1 mb-1">Infrastructure</h6>
                <h2 class="fw-bold text-dark">User Directory</h2>
            </div>
            <button class="btn btn-primary-sky shadow-sm" data-bs-toggle="modal" data-bs-target="#addUserModal">
                <i class="fas fa-user-plus me-2 small"></i>Provision New Node
            </button>
        </div>

        <div class="card shadow-sm border-0 rounded-4 overflow-hidden bg-white">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="sky-bg">
                        <tr>
                            <th class="ps-4 py-3 text-dark fw-bold">Identity</th>
                            <th class="py-3 text-dark fw-bold">Access Level</th>
                            <th class="py-3 text-dark fw-bold">Connectivity</th>
                            <th class="text-end pe-4 py-3 text-dark fw-bold">Operations</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="user : ${users}">
                            <td class="ps-4">
                                <div class="d-flex align-items-center">
                                    <div class="avatar-sm bg-primary bg-opacity-10 text-primary rounded-circle d-flex align-items-center justify-content-center me-3"
                                        style="width: 40px; height: 40px;">
                                        <i class="fas fa-user-shield"></i>
                                    </div>
                                    <div>
                                        <div class="fw-bold text-dark" th:text="${user.username}">Username</div>
                                        <small class="text-gray" th:text="${user.email}">email@example.com</small>
                                    </div>
                                </div>
                            </td>
                            <td>
                                <span th:each="role : ${user.roles}"
                                    class="badge border border-primary border-opacity-10 text-primary rounded-pill px-3 py-2 small me-1"
                                    th:text="${role.name}">ROLE</span>
                            </td>
                            <td>
                                <span th:if="${user.enabled}"
                                    class="badge bg-success bg-opacity-10 text-success rounded-pill px-3 py-2">
                                    <i class="fas fa-circle-check me-1 small"></i> Active
                                </span>
                                <span th:if="${!user.enabled}"
                                    class="badge bg-danger bg-opacity-10 text-danger rounded-pill px-3 py-2">
                                    <i class="fas fa-circle-xmark me-1 small"></i> Disabled
                                </span>
                            </td>
                            <td class="text-end pe-4">
                                <div class="d-flex justify-content-end gap-2">
                                    <button class="btn btn-icon-sky" title="View Profile">
                                        <i class="fas fa-satellite-dish"></i>
                                    </button>
                                    <button class="btn btn-icon-sky text-warning" title="Edit User">
                                        <i class="fas fa-sliders"></i>
                                    </button>
                                    <form th:action="@{/admin/users/delete}" method="post">
                                        <input type="hidden" name="id" th:value="${user.id}">
                                        <button type="submit" class="btn btn-icon-sky text-danger" title="Purge Account"
                                            onclick="return confirm('Purge this identity from the directory?')">
                                            <i class="fas fa-shield-slash"></i>
                                        </button>
                                    </form>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Modal for adding user -->
    <div class="modal fade" id="addUserModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content border-0 rounded-4 shadow">
                <div class="modal-header sky-bg border-bottom border-primary border-opacity-10 py-3">
                    <h5 class="modal-title fw-bold text-dark">Identity Provisioning</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <form th:action="@{/signup}" method="post">
                    <div class="modal-body p-4">
                        <div class="mb-3">
                            <label class="form-label small fw-bold text-gray">FULL IDENTITY NAME</label>
                            <input type="text" name="fullName" class="form-control" required placeholder="John Doe">
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label small fw-bold text-gray">USERNAME</label>
                                <input type="text" name="username" class="form-control" required placeholder="username">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label small fw-bold text-gray">EMAIL NODE</label>
                                <input type="email" name="email" class="form-control" required
                                    placeholder="email@example.com">
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label small fw-bold text-gray">MOBILE LINK</label>
                            <input type="tel" name="phoneNumber" class="form-control" required placeholder="+250...">
                        </div>
                        <div class="mb-3">
                            <label class="form-label small fw-bold text-gray">INITIAL ACCESS KEY</label>
                            <input type="password" name="password" class="form-control" required placeholder="••••••••"
                                minlength="6">
                        </div>
                        <div class="mb-3">
                            <label class="form-label small fw-bold text-gray">ACCESS LEVEL</label>
                            <select name="role" class="form-select" required>
                                <option value="ROLE_FARMER">Farmer Node</option>
                                <option value="ROLE_VENDOR">Vendor Node</option>
                                <option value="ROLE_ADMIN" sec:authorize="hasRole('ADMIN')">Administrator Level</option>
                            </select>
                        </div>
                    </div>
                    <div class="modal-footer border-0 p-4">
                        <button type="button" class="btn btn-light rounded-3 px-4"
                            data-bs-dismiss="modal">Cancel</button>
                        <button type="submit" class="btn btn-primary-sky">Provision Node</button>
                    </div>
                </form>
            </div>
        </div>
    </div>


    <div th:replace="fragments/footer :: footer"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
