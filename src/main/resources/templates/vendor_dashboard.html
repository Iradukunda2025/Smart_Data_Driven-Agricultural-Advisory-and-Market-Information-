<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Vendor Dashboard - FarmaSense</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body class="bg-light d-flex flex-column min-vh-100">

    <!-- Header Fragment -->
    <div th:replace="fragments/header :: header"></div>

    <div class="container mt-4">
        <h2>Vendor Dashboard</h2>
        <div class="row mt-4">
            <div class="col-md-8">
                <div class="card mb-4 shadow-sm">
                    <div class="card-header bg-primary text-white">Manage Market Prices</div>
                    <div class="card-body">
                        <table class="table table-striped">
                            <thead>
                                <tr>
                                    <th>Crop</th>
                                    <th>Price (RWF/kg)</th>
                                    <th>Market</th>
                                    <th>Last Updated</th>
                                    <th>Action</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="price : ${marketPrices}">
                                    <td th:text="${price.crop}">Potato</td>
                                    <td th:text="${price.price}">450</td>
                                    <td th:text="${#temporals.format(price.date, 'dd-MM-yyyy')}">Today</td>
                                    <td>
                                        <button class="btn btn-sm btn-outline-primary"><i class="fas fa-edit"></i></button>
                                        <button class="btn btn-sm btn-outline-danger"><i class="fas fa-trash"></i></button>
                                    </td>
                                </tr>
                                <tr th:if="${#lists.isEmpty(marketPrices)}">
                                    <td colspan="5" class="text-center">No market prices available.</td>
                                </tr>
                            </tbody>
                        </table>
                        <button class="btn btn-success">Update New Price</button>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card mb-4 shadow-sm">
                    <div class="card-header bg-secondary text-white">Notifications</div>
                    <div class="card-body">
                        <p>No new notifications.</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <!-- Footer Fragment -->
    <div th:replace="fragments/footer :: footer"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
