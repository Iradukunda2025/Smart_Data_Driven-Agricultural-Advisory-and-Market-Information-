<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Manage Weather - FarmaSense</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex flex-column min-vh-100">
    <div th:replace="fragments/header :: header"></div>

    <div class="container mt-4 flex-grow-1">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="fw-bold text-success">Weather Management</h2>
            <div class="d-flex" sec:authorize="hasRole('ADMIN')">
                <form th:action="@{/admin/weather/sync}" method="post" class="me-2">
                    <button type="submit" class="btn btn-outline-success shadow-sm">
                        <i class="fas fa-sync-alt me-2"></i>Sync Meteo Rwanda
                    </button>
                </form>
                <button class="btn btn-success shadow-sm" data-bs-toggle="modal" data-bs-target="#addWeatherModal">
                    <i class="fas fa-plus me-2"></i>Add Manual Entry
                </button>
            </div>
        </div>

        <div class="card shadow-sm border-0 rounded-4 overflow-hidden">
            <div class="table-responsive">
                <table class="table table-hover mb-0">
                    <thead class="table-dark">
                        <tr>
                            <th>Region</th>
                            <th>Forecast</th>
                            <th>Date</th>
                            <th class="text-end" sec:authorize="hasRole('ADMIN')">Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="weather : ${weatherData}">
                            <td th:text="${weather.region}" class="fw-bold">Region</td>
                            <td th:text="${weather.forecast}">Forecast</td>
                            <td th:text="${#temporals.format(weather.date, 'dd MMM yyyy')}">Date</td>
                            <td class="text-end" sec:authorize="hasRole('ADMIN')">
                                <div class="d-flex justify-content-end">
                                    <button class="btn btn-sm btn-outline-primary me-2"><i class="fas fa-edit"></i></button>
                                    <form th:action="@{/admin/weather/delete}" method="post" onsubmit="return confirm('Delete this weather entry?')">
                                        <input type="hidden" name="id" th:value="${weather.id}">
                                        <button type="submit" class="btn btn-sm btn-outline-danger"><i class="fas fa-trash"></i></button>
                                    </form>
                                </div>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(weatherData)}">
                            <td colspan="4" class="text-center py-5 text-muted">
                                <i class="fas fa-cloud-sun me-1"></i> No weather info available.
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Modal for adding weather -->
    <div class="modal fade" id="addWeatherModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content border-0 rounded-4 shadow">
                <div class="modal-header bg-success text-white">
                    <h5 class="modal-title">Add Weather Info</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <form th:action="@{/admin/weather/add}" method="post">
                    <div class="modal-body">
                        <div class="mb-3">
                            <label class="form-label">Region/Location</label>
                            <input type="text" name="region" class="form-control" required placeholder="e.g. Kigali">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Forecast</label>
                            <select name="forecast" class="form-select" required>
                                <option value="Sunny">Sunny</option>
                                <option value="Rainy">Rainy</option>
                                <option value="Cloudy">Cloudy</option>
                                <option value="Thunderstorms">Thunderstorms</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Date</label>
                            <input type="date" name="date" class="form-control" th:value="${#temporals.format(#temporals.createNow(), 'yyyy-MM-dd')}" required>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-light" data-bs-dismiss="modal">Cancel</button>
                        <button type="submit" class="btn btn-success">Save Entry</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <div th:replace="fragments/footer :: footer"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
