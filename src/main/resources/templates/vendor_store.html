<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <title>My Store - FarmaSense</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>

<body class="bg-light d-flex flex-column min-vh-100">
    <div th:replace="fragments/header :: header"></div>

    <div class="container mt-5 flex-grow-1">
        <div class="d-flex justify-content-between align-items-center mb-5">
            <div>
                <h6 class="text-primary-sky fw-bold text-uppercase ls-1 mb-1">Exchange Control</h6>
                <h2 class="fw-bold text-dark">Proprietary Asset Rates</h2>
            </div>
            <button class="btn btn-primary-sky px-4 shadow-sm" data-bs-toggle="modal" data-bs-target="#addPriceModal">
                <i class="fas fa-plus me-2 small"></i>Initialize New Listing
            </button>
        </div>

        <div class="card shadow-lg border-0 rounded-4 overflow-hidden bg-white">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="sky-bg">
                        <tr>
                            <th class="ps-4 py-3 text-dark fw-bold">Commodity</th>
                            <th class="py-3 text-dark fw-bold">Exchange Value (RWF)</th>
                            <th class="py-3 text-dark fw-bold">Effective Timestamp</th>
                            <th class="text-end pe-4 py-3 text-dark fw-bold">Protocols</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="price : ${marketPrices}">
                            <td class="ps-4">
                                <span th:text="${price.crop}" class="fw-bold text-dark">Crop</span>
                            </td>
                            <td>
                                <span
                                    class="badge bg-primary bg-opacity-10 text-primary-sky rounded-pill px-3 py-2 fw-bold"
                                    th:text="${#numbers.formatDecimal(price.price, 1, 0)}">Price</span>
                            </td>
                            <td class="text-gray small" th:text="${#temporals.format(price.date, 'dd MMM yyyy')}">Date
                            </td>
                            <td class="text-end pe-4">
                                <div class="d-flex justify-content-end gap-2">
                                    <button class="btn btn-icon-sky text-warning" title="Edit Record"
                                        th:onclick="'openEditModal(\'' + ${price.id} + '\', \'' + ${price.crop} + '\', \'' + ${price.price} + '\', \'' + ${price.date} + '\')'">
                                        <i class="fas fa-sliders"></i>
                                    </button>
                                    <form th:action="@{/admin/market/delete}" method="post">
                                        <input type="hidden" name="id" th:value="${price.id}">
                                        <button type="submit" class="btn btn-icon-sky text-danger"
                                            onclick="return confirm('Purge this asset record?')">
                                            <i class="fas fa-shield-slash"></i>
                                        </button>
                                    </form>
                                </div>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(marketPrices)}">
                            <td colspan="4" class="text-center py-5">
                                <i class="fas fa-box-open fa-3x text-primary opacity-10 mb-3"></i>
                                <p class="text-gray small">No active listings identified in your node.</p>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Modal for adding market price -->
    <div class="modal fade" id="addPriceModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content border-0 rounded-4 shadow">
                <div class="modal-header sky-bg border-bottom border-primary border-opacity-10 py-3">
                    <h5 class="modal-title fw-bold text-dark">New Registry Entry</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <form th:action="@{/admin/market/add}" method="post">
                    <div class="modal-body p-4">
                        <div class="mb-3">
                            <label class="form-label small fw-bold text-gray">COMMODITY NAME</label>
                            <input type="text" name="crop" class="form-control" required placeholder="e.g. Beans">
                        </div>
                        <div class="mb-3">
                            <label class="form-label small fw-bold text-gray">EXCHANGE VALUE (RWF/KG)</label>
                            <input type="number" name="price" class="form-control" required placeholder="0.00">
                        </div>
                        <div class="mb-3">
                            <label class="form-label small fw-bold text-gray">EFFECTIVE TIMESTAMP</label>
                            <input type="date" name="date" class="form-control"
                                th:value="${#temporals.format(#temporals.createNow(), 'yyyy-MM-dd')}" required>
                        </div>
                    </div>
                    <div class="modal-footer border-0 p-4">
                        <button type="button" class="btn btn-light rounded-3 px-4"
                            data-bs-dismiss="modal">Abort</button>
                        <button type="submit" class="btn btn-primary-sky px-4">Execute Entry</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Modal for editing market price -->
    <div class="modal fade" id="editPriceModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content border-0 rounded-4 shadow">
                <div class="modal-header sky-bg border-bottom border-primary border-opacity-10 py-3">
                    <h5 class="modal-title fw-bold text-dark">Calibrate Asset Node</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <form th:action="@{/admin/market/update}" method="post">
                    <input type="hidden" name="id" id="edit-id">
                    <div class="modal-body p-4">
                        <div class="mb-3">
                            <label class="form-label small fw-bold text-gray">COMMODITY NAME</label>
                            <input type="text" name="crop" id="edit-crop" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label small fw-bold text-gray">EXCHANGE VALUE (RWF/KG)</label>
                            <input type="number" name="price" id="edit-price" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label small fw-bold text-gray">TIMESTAMP</label>
                            <input type="date" name="date" id="edit-date" class="form-control" required>
                        </div>
                    </div>
                    <div class="modal-footer border-0 p-4">
                        <button type="button" class="btn btn-light rounded-3 px-4"
                            data-bs-dismiss="modal">Cancel</button>
                        <button type="submit" class="btn btn-primary-sky px-4">Update Interface</button>
                    </div>
                </form>
            </div>
        </div>
    </div>


    <div th:replace="fragments/footer :: footer"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function openEditModal(id, crop, price, date) {
            document.getElementById('edit-id').value = id;
            document.getElementById('edit-crop').value = crop;
            document.getElementById('edit-price').value = price;
            document.getElementById('edit-date').value = date;
            new bootstrap.Modal(document.getElementById('editPriceModal')).show();
        }
    </script>
</body>

</html>
