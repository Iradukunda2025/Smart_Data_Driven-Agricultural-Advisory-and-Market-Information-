<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <title>My Store - FarmaSense</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex flex-column min-vh-100">
    <div th:replace="fragments/header :: header"></div>

    <div class="container mt-4 flex-grow-1">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="fw-bold text-success">My Product Prices</h2>
            <button class="btn btn-success shadow-sm" data-bs-toggle="modal" data-bs-target="#addPriceModal">
                <i class="fas fa-plus me-2"></i>Add New Listing
            </button>
        </div>

        <div class="card shadow-sm border-0 rounded-4 overflow-hidden">
            <div class="table-responsive">
                <table class="table table-hover mb-0">
                    <thead class="table-dark">
                        <tr>
                            <th>Crop</th>
                            <th>Price (RWF/kg)</th>
                            <th>Date</th>
                            <th class="text-end">Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="price : ${marketPrices}">
                            <td th:text="${price.crop}" class="fw-bold text-success">Crop</td>
                            <td th:text="${#numbers.formatDecimal(price.price, 1, 'COMMA', 0, 'POINT')}">Price</td>
                            <td th:text="${#temporals.format(price.date, 'dd MMM yyyy')}">Date</td>
                            <td class="text-end">
                                <div class="d-flex justify-content-end">
                                    <button class="btn btn-sm btn-outline-primary me-2"><i class="fas fa-edit"></i></button>
                                    <form th:action="@{/admin/market/delete}" method="post" onsubmit="return confirm('Delete this record?')">
                                        <input type="hidden" name="id" th:value="${price.id}">
                                        <button type="submit" class="btn btn-sm btn-outline-danger"><i class="fas fa-trash"></i></button>
                                    </form>
                                </div>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(marketPrices)}">
                            <td colspan="4" class="text-center py-5 text-muted">
                                <i class="fas fa-store me-1"></i> You haven't added any prices yet.
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Modal for adding market price -->
    <div class="modal fade" id="addPriceModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content border-0 rounded-4 shadow">
                <div class="modal-header bg-success text-white">
                    <h5 class="modal-title">New Price Listing</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <form th:action="@{/admin/market/add}" method="post">
                    <div class="modal-body">
                        <div class="mb-3">
                            <label class="form-label">Crop Name</label>
                            <input type="text" name="crop" class="form-control" required placeholder="e.g. Beans">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Price (RWF per kg)</label>
                            <input type="number" name="price" class="form-control" required placeholder="0.00">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Effective Date</label>
                            <input type="date" name="date" class="form-control" th:value="${#temporals.format(#temporals.createNow(), 'yyyy-MM-dd')}" required>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-light" data-bs-dismiss="modal">Cancel</button>
                        <button type="submit" class="btn btn-success">Save Price</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <div th:replace="fragments/footer :: footer"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
