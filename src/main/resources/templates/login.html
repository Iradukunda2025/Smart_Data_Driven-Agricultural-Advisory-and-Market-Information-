<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - FarmaSense</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background-color: #f4f7f6;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-card {
            display: flex;
            width: 1000px;
            background: white;
            border-radius: 40px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.08);
            height: 650px;
        }

        .login-image {
            flex: 1.2;
            background: linear-gradient(rgba(45, 106, 79, 0.7), rgba(27, 67, 50, 0.8)), url('/login_image.webp') no-repeat center center;
            background-size: cover;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 60px;
            color: white;
            text-align: center;
        }

        .login-image h1 {
            font-weight: 800;
            font-size: 4rem;
            margin-bottom: 20px;
        }

        .login-form-container {
            flex: 1;
            padding: 60px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .form-title {
            font-weight: 700;
            color: #2d6a4f;
            font-size: 2.2rem;
            margin-bottom: 10px;
        }

        .input-group-text {
            background: white;
            border-right: none;
            color: #2d6a4f;
            padding-left: 20px;
        }

        .form-control {
            border-left: none;
            padding: 15px;
            padding-left: 10px;
            border-radius: 0 12px 12px 0;
            color: #334;
        }

        .form-control:focus {
            box-shadow: none;
            border-color: #dee2e6;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group:focus-within .input-group-text,
        .input-group:focus-within .form-control {
            border-color: #2d6a4f;
        }

        .btn-success-green {
            background-color: #52b788;
            border: none;
            padding: 15px;
            border-radius: 12px;
            color: white;
            font-weight: 700;
            font-size: 1.1rem;
            transition: 0.3s;
        }

        .btn-success-green:hover {
            background-color: #40916c;
            transform: translateY(-2px);
        }

        .social-btn {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid #eee;
            color: #666;
            transition: 0.3s;
            text-decoration: none;
        }

        .social-btn:hover {
            background: #f8f9fa;
            color: #2d6a4f;
        }

        @media (max-width: 992px) {
            .login-image {
                display: none;
            }

            .login-card {
                width: 450px;
                height: auto;
            }
        }
    </style>
</head>

<body>
    <div class="login-card">
        <div class="login-image">
            <h1>FarmaSense</h1>
            <p class="fs-5 fw-light">Empowering Rwandan Farmers through Technology & Insight.</p>
            <div class="mt-5 d-flex gap-2">
                <span class="btn btn-sm btn-outline-light rounded-pill px-3">Weather Insights</span>
                <span class="btn btn-sm btn-outline-light rounded-pill px-3">Market Prices</span>
                <span class="btn btn-sm btn-outline-light rounded-pill px-3">Expert Advice</span>
            </div>
        </div>

        <div class="login-form-container">
            <h2 class="form-title">Welcome Back</h2>
            <p class="text-muted mb-5">Login to your account to continue</p>

            <form th:action="@{/login}" method="post">
                <div class="mb-4">
                    <label class="form-label small fw-bold text-dark">Username</label>
                    <div class="input-group">
                        <span class="input-group-text border-end-0 border-light-subtle rounded-start-4"><i
                                class="fas fa-user small"></i></span>
                        <input type="text" name="username"
                            class="form-control border-start-0 border-light-subtle rounded-end-4"
                            placeholder="Enter username" required>
                    </div>
                </div>

                <div class="mb-4">
                    <label class="form-label small fw-bold text-dark">Password</label>
                    <div class="input-group">
                        <span class="input-group-text border-end-0 border-light-subtle rounded-start-4"><i
                                class="fas fa-lock small"></i></span>
                        <input type="password" name="password"
                            class="form-control border-start-0 border-light-subtle rounded-end-4" placeholder="••••••••"
                            required>
                    </div>
                </div>

                <div class="mb-4 p-3 border rounded-3 bg-light d-flex align-items-center">
                    <div class="form-check m-0">
                        <input class="form-check-input" type="checkbox" id="robotCheck" required>
                        <label class="form-check-label small fw-bold text-dark" for="robotCheck">I am not a
                            robot</label>
                    </div>
                    <i class="fas fa-robot ms-auto text-muted opacity-50"></i>
                </div>

                <div class="d-flex justify-content-between align-items-center mb-4">
                    <div class="form-check">
                        <input type="checkbox" class="form-check-input" id="remember">
                        <label class="form-check-label small" for="remember">Remember me</label>
                    </div>
                    <a href="#" class="small fw-bold text-success text-decoration-none">Forgot?</a>
                </div>

                <button type="submit" class="btn btn-success-green w-100 mb-4">
                    Sign In <i class="fas fa-sign-in-alt ms-2"></i>
                </button>
            </form>

            <div class="text-center">
                <p class="small text-muted">Don't have an account? <a th:href="@{/signup}"
                        class="text-success fw-bold text-decoration-none">Create Account</a></p>
                <div class="d-flex justify-content-center gap-3 mt-4">
                    <a href="#" class="social-btn"><i class="fab fa-google"></i></a>
                    <a href="#" class="social-btn"><i class="fab fa-facebook-f"></i></a>
                    <a href="#" class="social-btn"><i class="fab fa-twitter"></i></a>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
