<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - FarmaSense</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- FontAwesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        :root {
            --primary-green: #2d6a4f;
            --light-green: #d8f3dc;
            --accent-green: #95d5b2;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: #f8f9fa;
            overflow-x: hidden;
        }

        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-card {
            display: flex;
            width: 1000px;
            max-width: 100%;
            height: 600px;
            background: white;
            border-radius: 30px;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15);
        }

        .login-image {
            flex: 1;
            background: linear-gradient(rgba(45, 106, 79, 0.6), rgba(45, 106, 79, 0.6)), url('/login image.webp') no-repeat center center;
            background-size: cover;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px;
            color: white;
            text-align: center;
        }

        .login-image h1 {
            font-weight: 700;
            font-size: 3rem;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .login-form-container {
            width: 450px;
            padding: 60px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .form-title {
            font-weight: 700;
            color: var(--primary-green);
            margin-bottom: 10px;
        }

        .form-subtitle {
            color: #6c757d;
            margin-bottom: 30px;
        }

        .input-group-text {
            background: transparent;
            border-right: none;
            color: var(--primary-green);
        }

        .form-control {
            border-left: none;
            padding: 12px;
            font-size: 1rem;
        }

        .form-control:focus {
            box-shadow: none;
            border-color: #dee2e6;
        }

        .btn-success {
            background-color: var(--primary-green);
            border: none;
            padding: 14px;
            font-weight: 600;
            border-radius: 12px;
            transition: all 0.3s ease;
        }

        .btn-success:hover {
            background-color: #1b4332;
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(45, 106, 79, 0.4);
        }

        @media (max-width: 900px) {
            .login-image {
                display: none;
            }
            .login-card {
                width: 450px;
                height: auto;
            }
            .login-form-container {
                width: 100%;
                padding: 40px;
            }
        }

        .social-login {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 30px;
        }

        .social-btn {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid #dee2e6;
            color: #495057;
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .social-btn:hover {
            background-color: var(--light-green);
            color: var(--primary-green);
            border-color: var(--accent-green);
        }
    </style>
</head>

<body>

    <div class="login-container">
        <div class="login-card">
            <!-- Left Side: Image & Context -->
            <div class="login-image">
                <h1>FarmaSense</h1>
                <p class="lead">Empowering Rwandan Farmers through Technology & Insight.</p>
                <div class="mt-4">
                    <span class="badge rounded-pill bg-light text-success px-3 py-2 me-2">Weather Insights</span>
                    <span class="badge rounded-pill bg-light text-success px-3 py-2 me-2">Market Prices</span>
                    <span class="badge rounded-pill bg-light text-success px-3 py-2">Expert Advice</span>
                </div>
            </div>

            <!-- Right Side: Form -->
            <div class="login-form-container">
                <div class="text-center mb-4 d-lg-none">
                    <h2 class="form-title">FarmaSense</h2>
                </div>
                <h3 class="form-title">Welcome Back</h3>
                <p class="form-subtitle">Login to your account to continue</p>

                <form th:action="@{/login}" method="post">
                    <div class="mb-3">
                        <label class="form-label small fw-bold">Username</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fas fa-user"></i></span>
                            <input type="text" class="form-control" placeholder="Enter username" name="username" required>
                        </div>
                    </div>
                    <div class="mb-4">
                        <label class="form-label small fw-bold">Password</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fas fa-lock"></i></span>
                            <input type="password" class="form-control" placeholder="••••••••" name="password" required>
                        </div>
                    </div>

                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <div class="form-check">
                            <input type="checkbox" class="form-check-input" id="remember">
                            <label class="form-check-label small text-secondary" for="remember">Remember me</label>
                        </div>
                        <a href="#" class="small text-success fw-bold text-decoration-none">Forgot?</a>
                    </div>

                    <button type="submit" class="btn btn-success w-100 mb-3">
                        Sign In <i class="fas fa-arrow-right ms-2"></i>
                    </button>
                </form>

                <div class="text-center mt-3">
                    <p class="small text-secondary mb-0">Don't have an account? 
                        <a th:href="@{/signup}" class="text-success fw-bold text-decoration-none">Create Account</a>
                    </p>
                </div>

                <div class="social-login">
                    <a href="#" class="social-btn"><i class="fab fa-google"></i></a>
                    <a href="#" class="social-btn"><i class="fab fa-facebook-f"></i></a>
                    <a href="#" class="social-btn"><i class="fab fa-twitter"></i></a>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
