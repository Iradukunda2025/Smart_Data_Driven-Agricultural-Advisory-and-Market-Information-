<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - FarmaSense</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- FontAwesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body class="bg-light d-flex flex-column min-vh-100">

    <!-- Include Header Fragment -->
    <div th:replace="fragments/header :: header"></div>

    <main class="container my-auto">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                <div class="card shadow-lg border-0 rounded-4 overflow-hidden mask-custom">
                    <div class="card-header bg-success text-white text-center py-4">
                        <i class="fas fa-user-plus fa-3x mb-2"></i>
                        <h4 class="fw-bold mb-0">Create Account</h4>
                    </div>
                    <div class="card-body p-4 p-md-5">
                        <form th:action="@{/signup}" method="post">
                            <div class="mb-3 input-group">
                                <span class="input-group-text bg-white border-end-0"><i
                                        class="fas fa-user text-secondary"></i></span>
                                <input type="text" class="form-control border-start-0 ps-0" placeholder="Username"
                                    name="username" required>
                            </div>
                            <div class="mb-3 input-group">
                                <span class="input-group-text bg-white border-end-0"><i
                                        class="fas fa-lock text-secondary"></i></span>
                                <input type="password" class="form-control border-start-0 ps-0" placeholder="Password"
                                    name="password" required>
                            </div>

                            <div class="mb-3">
                                <label class="form-label text-secondary small">I am a:</label>
                                <div class="d-flex justify-content-around">
                                    <div class="form-check">
                                        <input class="form-check-input" type="radio" name="role" id="roleFarmer"
                                            value="FARMER" checked>
                                        <label class="form-check-label" for="roleFarmer">
                                            Farmer
                                        </label>
                                    </div>
                                    <div class="form-check">
                                        <input class="form-check-input" type="radio" name="role" id="roleVendor"
                                            value="VENDOR">
                                        <label class="form-check-label" for="roleVendor">
                                            Vendor
                                        </label>
                                    </div>
                                </div>
                            </div>

                            <button type="submit"
                                class="btn btn-success w-100 py-2 fw-bold text-uppercase shadow-hover transition-all">
                                Sign Up
                            </button>
                        </form>
                    </div>
                    <div class="card-footer bg-white text-center py-3 border-0">
                        <p class="small mb-0 text-secondary">Already have an account? <a th:href="@{/login}"
                                class="text-success fw-bold text-decoration-none">Login</a></p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Include Footer Fragment -->
    <div th:replace="fragments/footer :: footer"></div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
