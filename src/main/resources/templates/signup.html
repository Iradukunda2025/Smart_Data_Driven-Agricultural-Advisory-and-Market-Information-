<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join FarmaSense - Sign Up</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- FontAwesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        :root {
            --primary-green: #2d6a4f;
            --light-green: #d8f3dc;
            --accent-green: #95d5b2;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: #f0f2f5;
            min-height: 100vh;
        }

        .signup-container {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            min-height: calc(100vh - 140px);
        }

        .signup-card {
            display: flex;
            width: 1100px;
            max-width: 100%;
            background: white;
            border-radius: 40px;
            overflow: hidden;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.12);
        }

        .signup-image {
            flex: 1;
            background: linear-gradient(rgba(27, 67, 50, 0.4), rgba(27, 67, 50, 0.4)), url('/users_image.webp') no-repeat center center;
            background-size: cover;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 60px;
            color: white;
            text-align: center;
        }

        .signup-image h1 {
            font-weight: 800;
            font-size: 3.5rem;
            margin-bottom: 25px;
            text-shadow: 2px 4px 8px rgba(0,0,0,0.3);
        }

        .signup-form-container {
            width: 550px;
            padding: 50px 60px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .form-title {
            font-weight: 700;
            color: var(--primary-green);
            font-size: 2rem;
            margin-bottom: 8px;
        }

        .form-subtitle {
            color: #6c757d;
            margin-bottom: 35px;
        }

        .form-floating > .form-control {
            border-radius: 12px;
            border: 1px solid #e0e0e0;
        }

        .form-floating > label {
            color: #adb5bd;
        }

        .btn-success {
            background-color: var(--primary-green);
            border: none;
            padding: 16px;
            font-weight: 700;
            border-radius: 15px;
            letter-spacing: 0.5px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .btn-success:hover {
            background-color: #1b4332;
            transform: translateY(-3px);
            box-shadow: 0 15px 25px rgba(45, 106, 79, 0.3);
        }

        .role-selector {
            border: 1.5px solid #f0f0f0;
            border-radius: 15px;
            padding: 15px;
            background: #fafafa;
        }

        @media (max-width: 1000px) {
            .signup-image {
                display: none;
            }
            .signup-card {
                width: 550px;
            }
        }
    </style>
</head>

<body class="d-flex flex-column min-vh-100">

    <!-- Include Header Fragment -->
    <div th:replace="fragments/header :: header"></div>

    <main class="signup-container">
        <div class="signup-card">
            <!-- Left Side: Visual Message -->
            <div class="signup-image">
                <i class="fas fa-seedling fa-4x mb-4 text-accent"></i>
                <h1>Grow With Us</h1>
                <p class="lead text-light">Register to access expert agricultural insights, real-time market trends, and reliable weather forecasts.</p>
                <div class="mt-5 d-flex flex-wrap justify-content-center gap-3">
                    <div class="bg-white bg-opacity-10 backdrop-blur rounded-pill px-4 py-2 small border border-white border-opacity-20"><i class="fas fa-check-circle me-2"></i>Smart Data</div>
                    <div class="bg-white bg-opacity-10 backdrop-blur rounded-pill px-4 py-2 small border border-white border-opacity-20"><i class="fas fa-check-circle me-2"></i>Expert Advice</div>
                    <div class="bg-white bg-opacity-10 backdrop-blur rounded-pill px-4 py-2 small border border-white border-opacity-20"><i class="fas fa-check-circle me-2"></i>Secure Access</div>
                </div>
            </div>

            <!-- Right Side: Form -->
            <div class="signup-form-container">
                <h2 class="form-title">Create Account</h2>
                <p class="form-subtitle">Join the FarmaSense community today</p>

                <div th:if="${error}" class="alert alert-danger border-0 shadow-sm rounded-4 py-3 mb-4 animate__animated animate__shakeX">
                    <i class="fas fa-exclamation-circle me-2"></i>
                    <span th:text="${error}">Error details</span>
                </div>

                <form th:action="@{/signup}" method="post">
                    <div class="form-floating mb-3">
                        <input type="text" class="form-control" id="fullName" name="fullName" placeholder="John Doe" required>
                        <label for="fullName"><i class="fas fa-id-card me-2"></i>Full Name</label>
                    </div>

                    <div class="row g-3 mb-3">
                        <div class="col-md-6">
                            <div class="form-floating">
                                <input type="text" class="form-control" id="username" name="username" placeholder="username" required>
                                <label for="username"><i class="fas fa-user me-2"></i>Username</label>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="form-floating">
                                <input type="email" class="form-control" id="email" name="email" placeholder="name@example.com" required>
                                <label for="email"><i class="fas fa-envelope me-2"></i>Email</label>
                            </div>
                        </div>
                    </div>

                    <div class="form-floating mb-3">
                        <input type="tel" class="form-control" id="phoneNumber" name="phoneNumber" placeholder="+250..." required>
                        <label for="phoneNumber"><i class="fas fa-phone-alt me-2"></i>Phone Number</label>
                    </div>

                    <div class="form-floating mb-4">
                        <input type="password" class="form-control" id="password" name="password" placeholder="Password" required minlength="6">
                        <label for="password"><i class="fas fa-lock me-2"></i>Password (min. 6 chars)</label>
                    </div>

                    <div class="mb-4">
                        <label class="form-label small fw-bold text-secondary mb-2 ms-2">Account Type</label>
                        <div class="role-selector d-flex justify-content-around">
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="role" id="roleFarmer" value="FARMER" checked>
                                <label class="form-check-label fw-bold small" for="roleFarmer">Farmer</label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="role" id="roleVendor" value="VENDOR">
                                <label class="form-check-label fw-bold small" for="roleVendor">Vendor</label>
                            </div>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-success w-100 shadow-lg mt-2">
                        Get Started <i class="fas fa-arrow-right ms-2 fs-5"></i>
                    </button>
                </form>

                <div class="text-center mt-5">
                    <p class="small text-secondary mb-0">Already a member? <a th:href="@{/login}" class="text-success fw-bold text-decoration-none border-bottom border-success border-2">Login Here</a></p>
                </div>
            </div>
        </div>
    </main>

    <!-- Include Footer Fragment -->
    <div th:replace="fragments/footer :: footer"></div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
