<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join FarmaSense - Sign Up</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background-color: #f4f7f6;
            min-height: 100vh;
        }

        .signup-container {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        .signup-card {
            display: flex;
            width: 1100px;
            background: white;
            border-radius: 40px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.08);
            min-height: 700px;
        }

        .signup-image {
            flex: 1;
            background: linear-gradient(rgba(27, 67, 50, 0.8), rgba(27, 67, 50, 0.9)), url('/farmersense registration image.jpg') no-repeat center center;
            background-size: cover;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 60px;
            color: white;
            text-align: center;
        }

        .signup-image h1 {
            font-weight: 800;
            font-size: 4rem;
            margin-bottom: 25px;
        }

        .signup-form-container {
            flex: 1.2;
            padding: 60px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .form-title {
            font-weight: 700;
            color: #2d6a4f;
            font-size: 2.2rem;
            margin-bottom: 5px;
        }

        .form-control {
            border-radius: 12px;
            padding: 12px 20px;
            background-color: #fff;
            border: 1px solid #e9ecef;
            margin-bottom: 15px;
            font-size: 0.95rem;
        }

        .form-control:focus {
            box-shadow: none;
            border-color: #2d6a4f;
            background-color: #fff;
        }

        .input-group-text {
            background-color: transparent;
            border: none;
            color: #adb5bd;
            position: absolute;
            left: 10px;
            top: 50%;
            transform: translateY(-50%);
            z-index: 10;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper .form-control {
            padding-left: 45px;
        }

        .btn-success-green {
            background-color: #2d6a4f;
            border: none;
            padding: 15px;
            border-radius: 12px;
            color: white;
            font-weight: 700;
            font-size: 1.1rem;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 10px;
        }

        .btn-success-green:hover {
            background-color: #1b4332;
            transform: translateY(-2px);
            color: white;
        }

        .role-selector {
            background-color: #f8fafc;
            border-radius: 15px;
            padding: 12px;
            display: flex;
            gap: 10px;
        }

        .role-option {
            flex: 1;
            text-align: center;
        }

        .form-check-input:checked {
            background-color: #0d6efd;
            border-color: #0d6efd;
        }

        @media (max-width: 992px) {
            .signup-image {
                display: none;
            }

            .signup-card {
                width: 550px;
            }
        }
    </style>
</head>

<body class="d-flex flex-column min-vh-100">
    <div th:replace="fragments/header :: header"></div>

    <main class="signup-container flex-grow-1">
        <div class="signup-card">
            <div class="signup-image">
                <i class="fas fa-leaf fa-3x mb-4 opacity-75"></i>
                <h1>Grow With Us</h1>
                <p class="fs-5 opacity-75">Register to access expert agricultural insights, real-time market trends, and
                    reliable weather forecasts.</p>
                <div class="mt-5 d-flex flex-wrap justify-content-center gap-2">
                    <span class="badge rounded-pill border border-white border-opacity-50 px-3 py-2"><i
                            class="fas fa-check-circle me-2"></i>Smart Data</span>
                    <span class="badge rounded-pill border border-white border-opacity-50 px-3 py-2"><i
                            class="fas fa-check-circle me-2"></i>Expert Advice</span>
                    <span class="badge rounded-pill border border-white border-opacity-50 px-3 py-2"><i
                            class="fas fa-check-circle me-2"></i>Secure Access</span>
                </div>
            </div>

            <div class="signup-form-container">
                <h2 class="form-title">Create Account</h2>
                <p class="text-muted mb-5">Join the FarmaSense community today</p>

                <div th:if="${error}" class="alert alert-danger border-0 rounded-3 mb-4">
                    <i class="fas fa-exclamation-circle me-2"></i> <span th:text="${error}">Error</span>
                </div>

                <form th:action="@{/signup}" method="post">
                    <div class="input-wrapper">
                        <span class="input-group-text"><i class="fas fa-id-card small"></i></span>
                        <input type="text" name="fullName" class="form-control" placeholder="Full Name" required>
                    </div>

                    <div class="row g-2">
                        <div class="col-md-6">
                            <div class="input-wrapper">
                                <span class="input-group-text"><i class="fas fa-user small"></i></span>
                                <input type="text" name="username" class="form-control" placeholder="Username" required>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="input-wrapper">
                                <span class="input-group-text"><i class="fas fa-envelope small"></i></span>
                                <input type="email" name="email" class="form-control" placeholder="Email" required>
                            </div>
                        </div>
                    </div>

                    <div class="input-wrapper">
                        <span class="input-group-text"><i class="fas fa-phone small"></i></span>
                        <input type="tel" name="phoneNumber" class="form-control" placeholder="Phone Number" required>
                    </div>

                    <div class="input-wrapper">
                        <span class="input-group-text"><i class="fas fa-lock small"></i></span>
                        <input type="password" name="password" class="form-control"
                            placeholder="Password (min. 6 chars)" required minlength="6">
                    </div>

                    <div class="mb-4">
                        <label class="form-label small fw-bold text-muted mb-2">Account Type</label>
                        <div class="role-selector">
                            <div class="role-option">
                                <div class="form-check d-flex align-items-center justify-content-center gap-2 m-0">
                                    <input class="form-check-input" type="radio" name="role" id="roleFarmer"
                                        value="FARMER" checked>
                                    <label class="form-check-label fw-bold text-muted small"
                                        for="roleFarmer">Farmer</label>
                                </div>
                            </div>
                            <div class="role-option">
                                <div class="form-check d-flex align-items-center justify-content-center gap-2 m-0">
                                    <input class="form-check-input" type="radio" name="role" id="roleVendor"
                                        value="VENDOR">
                                    <label class="form-check-label fw-bold text-muted small"
                                        for="roleVendor">Vendor</label>
                                </div>
                            </div>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-success-green w-100">
                        Get Started <i class="fas fa-arrow-right"></i>
                    </button>
                </form>

                <div class="text-center mt-5">
                    <p class="small text-muted">Already a member? <a th:href="@{/login}"
                            class="text-success fw-bold text-decoration-none">Login Here</a></p>
                </div>
            </div>
        </div>
    </main>

    <div th:replace="fragments/footer :: footer"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
