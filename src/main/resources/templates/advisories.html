<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agricultural Advisory - FarmaSense</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .advisory-hero {
            height: 300px;
            background: linear-gradient(rgba(27, 67, 50, 0.5), rgba(27, 67, 50, 0.9)), url('/advisory image.jpg') center/cover;
            border-radius: 0 0 50px 50px;
            display: flex;
            align-items: center;
            color: white;
            margin-bottom: 50px;
        }

        .advisory-card {
            border-radius: 20px;
            border: none;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            background: white;
            transition: 0.3s;
        }

        .advisory-card:hover {
            transform: translateY(-5px);
        }
    </style>
</head>

<body class="bg-light d-flex flex-column min-vh-100">
    <div th:replace="fragments/header :: header"></div>

    <div class="advisory-hero">
        <div class="container text-center text-md-start">
            <h1 class="display-4 fw-bold mb-0">Agricultural Knowledge Base</h1>
            <p class="lead opacity-75">Expert guidance for sustainable Rwandan farming operations.</p>
        </div>
    </div>

    <div class="container flex-grow-1 pb-5">
        <div class="d-flex justify-content-between align-items-center mb-5">
            <h3 class="fw-bold mb-0"><i class="fas fa-book-sparkles me-2 text-success"></i>Available Advisories</h3>
            <button class="btn btn-success fw-bold px-4 rounded-3" data-bs-toggle="modal"
                data-bs-target="#addAdvisoryModal" sec:authorize="hasAnyRole('ADMIN', 'VENDOR')">
                <i class="fas fa-plus me-2 mb-1"></i>New Advisory
            </button>
        </div>

        <div class="row g-4">
            <div th:each="advisory : ${advisories}" class="col-md-6 col-lg-4">
                <div class="advisory-card h-100 p-4">
                    <div class="d-flex justify-content-between mb-4 border-bottom pb-2">
                        <span class="badge bg-success bg-opacity-10 text-success rounded-pill px-3 py-2">Expert
                            Advice</span>
                        <small class="text-muted"><i
                                class="far fa-calendar-alt me-1"></i>[[${#temporals.format(advisory.date, 'dd MMM
                            yyyy')}]]</small>
                    </div>
                    <h5 class="fw-bold text-dark mb-3" th:text="${advisory.title}">Title</h5>
                    <p class="text-muted small mb-4" style="line-height: 1.7;" th:text="${advisory.description}">
                        Description...</p>

                    <div class="mt-auto pt-3 border-top d-flex justify-content-end gap-2"
                        sec:authorize="hasAnyRole('ADMIN', 'VENDOR')">
                        <button class="btn btn-sm btn-light text-warning px-3 rounded-pill" th:data-id="${advisory.id}"
                            th:data-title="${advisory.title}" th:data-desc="${advisory.description}"
                            th:data-date="${advisory.date}" onclick="prepEdit(this)">
                            <i class="fas fa-edit"></i>
                        </button>
                        <form th:action="@{/admin/advisories/delete}" method="post">
                            <input type="hidden" name="id" th:value="${advisory.id}">
                            <button type="submit" class="btn btn-sm btn-light text-danger px-3 rounded-pill"
                                onclick="return confirm('Delete this advisory?')">
                                <i class="fas fa-trash"></i>
                            </button>
                        </form>
                    </div>
                </div>
            </div>
            <div th:if="${#lists.isEmpty(advisories)}" class="col-12 text-center py-5">
                <i class="fas fa-folder-open fa-3x text-muted opacity-25 mb-3"></i>
                <p class="text-muted">No advisories currently published.</p>
            </div>
        </div>
    </div>

    <!-- Modals -->
    <div class="modal fade" id="addAdvisoryModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content border-0 rounded-4 shadow">
                <div class="modal-header bg-success text-white border-0 py-3">
                    <h5 class="modal-title fw-bold">Publish New Advisory</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <form th:action="@{/admin/advisories/add}" method="post">
                    <div class="modal-body p-4">
                        <div class="mb-3">
                            <label class="form-label small fw-bold text-muted">TITLE</label>
                            <input type="text" name="title" class="form-control" required
                                placeholder="e.g. Maize Crop Health">
                        </div>
                        <div class="mb-3">
                            <label class="form-label small fw-bold text-muted">DESCRIPTION</label>
                            <textarea name="description" class="form-control" rows="5" required
                                placeholder="Guidance for farmers..."></textarea>
                        </div>
                        <div class="mb-3">
                            <label class="form-label small fw-bold text-muted">DATE</label>
                            <input type="date" name="date" class="form-control"
                                th:value="${#temporals.format(#temporals.createNow(), 'yyyy-MM-dd')}" required>
                        </div>
                    </div>
                    <div class="modal-footer border-0 p-4 pt-0">
                        <button type="button" class="btn btn-light rounded-3 px-4"
                            data-bs-dismiss="modal">Cancel</button>
                        <button type="submit" class="btn btn-success rounded-3 px-4 fw-bold">Publish Now</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Edit Modal -->
    <div class="modal fade" id="editAdvisoryModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content border-0 rounded-4 shadow">
                <div class="modal-header bg-warning text-dark border-0 py-3">
                    <h5 class="modal-title fw-bold text-uppercase small">Update Advisory</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <form th:action="@{/admin/advisories/update}" method="post">
                    <input type="hidden" name="id" id="edit-id">
                    <div class="modal-body p-4">
                        <div class="mb-3">
                            <label class="form-label small fw-bold text-muted">TITLE</label>
                            <input type="text" name="title" id="edit-title" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label small fw-bold text-muted">DESCRIPTION</label>
                            <textarea name="description" id="edit-desc" class="form-control" rows="5"
                                required></textarea>
                        </div>
                        <div class="mb-3">
                            <label class="form-label small fw-bold text-muted">DATE</label>
                            <input type="date" name="date" id="edit-date" class="form-control" required>
                        </div>
                    </div>
                    <div class="modal-footer border-0 p-4 pt-0">
                        <button type="button" class="btn btn-light rounded-3 px-4"
                            data-bs-dismiss="modal">Cancel</button>
                        <button type="submit" class="btn btn-warning rounded-3 px-4 text-dark fw-bold">Apply
                            Changes</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <div th:replace="fragments/footer :: footer"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function prepEdit(btn) {
            document.getElementById('edit-id').value = btn.getAttribute('data-id');
            document.getElementById('edit-title').value = btn.getAttribute('data-title');
            document.getElementById('edit-desc').value = btn.getAttribute('data-desc');
            document.getElementById('edit-date').value = btn.getAttribute('data-date');
            new bootstrap.Modal(document.getElementById('editAdvisoryModal')).show();
        }
    </script>
</body>

</html>
